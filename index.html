<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
  

<div id="outer">
    <form autocomplete="off" novalidate>

        <div> <input type="text" placeholder="name" id="name">
            <small>Name is to short</small>
        </div>

        <div> <input type="email" placeholder="email"  id="email">
            <small>Email is not correct</small>
        </div>

        <div> <input type="password" placeholder="password" id="password">
            <small>Password is to short</small>
        </div>

        <select>
            <option value=""></option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="others">Others</option>
        </select>
        <textarea placeholder="Tell us about you"></textarea>
        <button>submit</button>

    </form>
    <div id="resultMessage">
        There are errors
    </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
